<div class="app-page">

    <div class="app-header">
        <div class="header-left">
            <img class="spotify-icon" src="img/icon.png">
            <div class="app-title">Spotify Explorer</div>
        </div>
        <div class="header-center">
            <button class="header-btn">Músicas</button>
            <button class="header-btn">Artistas</button>
            <button class="header-btn active">Gêneros</button>
            <button class="header-btn">Estatísticas</button>
        </div>
        <div class="header-right"></div>
    </div>

    <div class="genero-body">

        <div class="genero-nav">
            <div class="text-light">ordenar</div>
            <select class="dropdown-btn" placeholder="ordenar">
                <option value="" selected disabled>Qtd. músicas</option>
            </select>
            <button class="sort-btn">
                <div class="up-arrow-icon">⬆</div>
                <div class="down-arrow-icon">⬇</div>
            </button>
            <div class="search-bar">
                <span class="search-icon"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></span>
                <input placeholder="Pesquisar Gênero...">
            </div>
            <button class="accent-btn">Pesquisar</button>
        </div>

        <table class="genero-tbl">
            <thead class="text-light-bold">
                <tr>
                    <th data-type="string">GÊNERO</th>
                    <th data-type="number">QTD. MÚSICAS</th>
                    <th data-type="number">POP. MÉDIA</th>
                    <th data-type="number">ARTISTAS</th>
                </tr>
            </thead>

            <tbody class="text-mid">
                <tr> <td>Pop</td>     <td>12450</td>  <td>82.3</td> <td>2840</td> </tr>
                <tr> <td>Hip-Hop</td> <td>9820</td> <td>78.1</td>  <td>1920</td> </tr>
                <tr> <td>Rock</td>    <td>8340</td>  <td>71.5</td>  <td>2100</td> </tr>
                <tr> <td>R&B</td>     <td>6180</td> <td>74.9</td> <td>980</td> </tr>
                <tr> <td>EDM</td>     <td>5640</td> <td>69.2</td> <td>760</td> </tr>
            </tbody>
        </table>

        <div class="genero-foot">
            <div class="text-light">113 gêneros</div>
            <div class="foot-btns">
                <button class="prev-btn"></button>
                <button class="number-btn active">1</button>
                <button class="number-btn">2</button>
                <button class="number-btn">3</button>
                <div class="text-light">...</div>
                <button class="number-btn">12</button>
                <button class="next-btn"></button>
            </div>
            <div class="text-light">pg. 1/12</div>
        </div>

    </div>

</div>
